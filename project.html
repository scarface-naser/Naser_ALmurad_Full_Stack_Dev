<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" type="image/png" href="./images/favIcon.png" />

    <title>Project Detail</title>

    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
      /* Ensure placeholder video container has height if empty */
      .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
      .no-video-message {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
        color: var(--card);
        background: #000;
        position: absolute;
        inset: 0;
      }
    </style>
  </head>
  <body class="project-page">
    <main class="page">
      <div class="links_container">
        <a class="back-link" href="./index.html">← Back to Portfolio</a>

        <div style="display: flex">
          <lottie-player
            src="./animation/gitHubiCon.json"
            background="transparent"
            speed="1"
            style="width: 50px; height: 50px"
            loop
            autoplay
          >
          </lottie-player>
          <a
            class="github_link"
            id="project-source"
            href="#"
            target="_blank"
          >
            Source Code
          </a>
        </div>
      </div>
      <article class="project-card" aria-labelledby="project-title">
        <header class="project-header">
          <div class="header-container">
            <h1 id="project-title" class="project-title">
              Loading...
            </h1>
          </div>
        </header>

        <div class="video-wrapper" id="project-video-container" style="margin-bottom: 1rem">
          <!-- Video will be injected here -->
        </div>

        <section class="project-description">
          <pre
            id="project-description"
            style="
              margin-bottom: 1rem;
              line-height: 1.6;
              max-width: 900px;
              text-align: justify;
              white-space: pre-wrap;
              word-wrap: break-word;
              line-height: 1.6;
              font-family: inherit; /* Inherit font from body/pre not overridden weirdly */
            "
          ></pre>

          <div class="project-footer" id="project-tags">
            <!-- Tags injected here -->
          </div>
        </section>
      </article>
    </main>
    <br />

    <script defer src="data.js"></script>
    <script defer src="detail-script.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
          if (typeof loadProjectDetail === 'function') loadProjectDetail();
      });
    </script>
  </body>
</html>
