    <section class="bodyOfProject" id="projects">
      <h1 class="project_section">Projects</h1>
      <br /><br />
      <br />
      <main class="main-container">
        <svg class="svg-container">
          <defs>
            <filter
              id="turbulent-displace"
              colorInterpolationFilters="sRGB"
              x="-20%"
              y="-20%"
              width="140%"
              height="140%"
            >
              <feTurbulence
                type="turbulence"
                baseFrequency="0.02"
                numOctaves="10"
                result="noise1"
                seed="1"
              />
              <feOffset in="noise1" dx="0" dy="0" result="offsetNoise1">
                <animate
                  attributeName="dy"
                  values="700; 0"
                  dur="6s"
                  repeatCount="indefinite"
                  calcMode="linear"
                />
              </feOffset>

              <feTurbulence
                type="turbulence"
                baseFrequency="0.02"
                numOctaves="10"
                result="noise2"
                seed="1"
              />
              <feOffset in="noise2" dx="0" dy="0" result="offsetNoise2">
                <animate
                  attributeName="dy"
                  values="0; -700"
                  dur="6s"
                  repeatCount="indefinite"
                  calcMode="linear"
                />
              </feOffset>

              <feTurbulence
                type="turbulence"
                baseFrequency="0.02"
                numOctaves="10"
                result="noise1"
                seed="2"
              />
              <feOffset in="noise1" dx="0" dy="0" result="offsetNoise3">
                <animate
                  attributeName="dx"
                  values="490; 0"
                  dur="6s"
                  repeatCount="indefinite"
                  calcMode="linear"
                />
              </feOffset>

              <feTurbulence
                type="turbulence"
                baseFrequency="0.02"
                numOctaves="10"
                result="noise2"
                seed="2"
              />
              <feOffset in="noise2" dx="0" dy="0" result="offsetNoise4">
                <animate
                  attributeName="dx"
                  values="0; -490"
                  dur="6s"
                  repeatCount="indefinite"
                  calcMode="linear"
                />
              </feOffset>

              <feComposite
                in="offsetNoise1"
                in2="offsetNoise2"
                result="part1"
              />
              <feComposite
                in="offsetNoise3"
                in2="offsetNoise4"
                result="part2"
              />
              <feBlend
                in="part1"
                in2="part2"
                mode="color-dodge"
                result="combinedNoise"
              />

              <feDisplacementMap
                in="SourceGraphic"
                in2="combinedNoise"
                scale="30"
                xChannelSelector="R"
                yChannelSelector="B"
              />
            </filter>
          </defs>
        </svg>
        <!-- Cards will be generated here by generate_cards.js -->
      </main>
    </section>

    <script defer src="data.js"></script>

    <script>
      const toggle = document.getElementById("menu-toggle");
      const nav = document.getElementById("navigation");

      // Toggle nav visibility
      toggle.addEventListener("click", (event) => {
        event.stopPropagation(); // Prevent click from bubbling to document
        nav.classList.toggle("active");
      });

      // Close nav when clicking outside of it
      document.addEventListener("click", (event) => {
        // Check if click is outside the navigation and toggle button
        if (!nav.contains(event.target) && !toggle.contains(event.target)) {
          nav.classList.remove("active");
        }
      });

      // Close nav when scrolling
      window.addEventListener("scroll", () => {
        nav.classList.remove("active");
      });

      // Animation on load
      window.addEventListener("load", () => {
        document.body.classList.add("loaded");
      });

      // download the cv

      function downloadCV() {
        // Replace with the actual path to your CV file
        const link = document.createElement("a");
        link.href = "./cv/Naser_FS_cv.pdf"; // your CV file path (can be in same folder)
        link.download = "Naser Almurad CV.pdf"; // name of the downloaded file
        link.click();
      }

      // smooth scroll to sections services, projects, contact

      function scrollToSection(id) {
        document.getElementById(id).scrollIntoView({ behavior: "smooth" });
      }


    </script>
